<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cta-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#030310"/><stop offset="100%" stop-color="#080520"/></linearGradient>
    <linearGradient id="cta-n" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00ffff"/><stop offset="50%" stop-color="#7b2fff"/><stop offset="100%" stop-color="#ff00aa"/></linearGradient>
    <filter id="cta-glow"><feGaussianBlur stdDeviation="5"/><feMerge><feMergeNode/><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="cta-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.3" opacity="0.08"/></pattern>
    <pattern id="cta-dot" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="#00ffff" opacity="0.15"/></pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#cta-bg)"/>
  <rect width="1200" height="400" fill="url(#cta-grid)"/>
  <rect width="1200" height="400" fill="url(#cta-dot)"/>
  <!-- 頂部和底部霓虹線 -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="url(#cta-n)" stroke-width="2" filter="url(#cta-glow)"/>
  <line x1="0" y1="398" x2="1200" y2="398" stroke="url(#cta-n)" stroke-width="2" filter="url(#cta-glow)"/>
  <!-- 背景光暈 -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="#00ffff" fill-opacity="0.025" filter="url(#cta-glow)"/>
  <ellipse cx="900" cy="200" rx="250" ry="180" fill="#7b2fff" fill-opacity="0.025" filter="url(#cta-glow)"/>
  <!-- 電路裝飾左 -->
  <line x1="0" y1="200" x2="120" y2="200" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="200" x2="120" y2="150" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="150" x2="200" y2="150" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <circle cx="120" cy="200" r="4" fill="#00ffff" opacity="0.7" filter="url(#cta-glow)"/>
  <!-- 電路裝飾右 -->
  <line x1="1200" y1="200" x2="1080" y2="200" stroke="#ff00aa" stroke-width="1" opacity="0.3"/>
  <line x1="1080" y1="200" x2="1080" y2="250" stroke="#ff00aa" stroke-width="1" opacity="0.3"/>
  <line x1="1080" y1="250" x2="1000" y2="250" stroke="#ff00aa" stroke-width="1" opacity="0.3"/>
  <circle cx="1080" cy="200" r="4" fill="#ff00aa" opacity="0.7" filter="url(#cta-glow)"/>
  <!-- 中央文字框 -->
  <rect x="350" y="140" width="500" height="120" rx="12" fill="rgba(0,255,255,0.03)" stroke="url(#cta-n)" stroke-width="1"/>
  <text x="600" y="195" text-anchor="middle" fill="#00ffff" font-size="14" font-family="monospace" letter-spacing="8" filter="url(#cta-glow)">AI BONE LIFE</text>
  <text x="600" y="220" text-anchor="middle" fill="#7b2fff" font-size="10" font-family="monospace" letter-spacing="3">SYSTEM.ONLINE</text>
  <text x="600" y="243" text-anchor="middle" fill="#ff00aa" font-size="8" font-family="monospace">VERSION 5.0 — CYBERPUNK EDITION</text>
  <!-- 粒子 -->
  <circle cx="150" cy="80" r="3" fill="#00ffff" opacity="0.5" filter="url(#cta-glow)"/>
  <circle cx="1050" cy="80" r="2.5" fill="#ff00aa" opacity="0.6" filter="url(#cta-glow)"/>
  <circle cx="200" cy="320" r="2" fill="#7b2fff" opacity="0.5"/>
  <circle cx="1000" cy="320" r="3" fill="#00ffff" opacity="0.4" filter="url(#cta-glow)"/>
  <circle cx="600" cy="60" r="2" fill="#ff00aa" opacity="0.5"/>
  <circle cx="600" cy="340" r="2" fill="#00ffff" opacity="0.5"/>
</svg>