<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ct-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050510"/><stop offset="100%" stop-color="#0a0520"/></linearGradient>
    <linearGradient id="ct-n1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00ffff"/><stop offset="100%" stop-color="#7b2fff"/></linearGradient>
    <filter id="ct-glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="ct-grid" width="25" height="25" patternUnits="userSpaceOnUse"><path d="M 25 0 L 0 0 0 25" fill="none" stroke="#00ffff" stroke-width="0.25" opacity="0.12"/></pattern>
  </defs>
  <rect width="500" height="350" fill="url(#ct-bg)"/>
  <rect width="500" height="350" fill="url(#ct-grid)"/>
  <!-- 中央六邊形 -->
  <polygon points="250,80 310,115 310,185 250,220 190,185 190,115" fill="rgba(0,255,255,0.04)" stroke="#00ffff" stroke-width="1.5" filter="url(#ct-glow)"/>
  <polygon points="250,100 295,125 295,175 250,200 205,175 205,125" fill="rgba(123,47,255,0.06)" stroke="#7b2fff" stroke-width="1"/>
  <text x="250" y="145" text-anchor="middle" fill="#00ffff" font-size="30" filter="url(#ct-glow)">🤖</text>
  <text x="250" y="168" text-anchor="middle" fill="#00ffff" font-size="8" font-family="monospace" letter-spacing="2">AI CORE</text>
  <!-- 軌道環 -->
  <ellipse cx="250" cy="150" rx="110" ry="110" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.3"/>
  <ellipse cx="250" cy="150" rx="145" ry="145" fill="none" stroke="#7b2fff" stroke-width="0.6" stroke-dasharray="4 8" opacity="0.2"/>
  <!-- 軌道節點 -->
  <circle cx="360" cy="150" r="8" fill="#050510" stroke="#00ffff" stroke-width="1.5" filter="url(#ct-glow)"/>
  <text x="360" y="154" text-anchor="middle" fill="#00ffff" font-size="8">▶</text>
  <circle cx="140" cy="150" r="8" fill="#050510" stroke="#ff00aa" stroke-width="1.5" filter="url(#ct-glow)"/>
  <text x="140" y="154" text-anchor="middle" fill="#ff00aa" font-size="8">◀</text>
  <circle cx="250" cy="40" r="8" fill="#050510" stroke="#7b2fff" stroke-width="1.5" filter="url(#ct-glow)"/>
  <text x="250" y="44" text-anchor="middle" fill="#7b2fff" font-size="8">▲</text>
  <circle cx="250" cy="260" r="8" fill="#050510" stroke="#00ffff" stroke-width="1.5" filter="url(#ct-glow)"/>
  <text x="250" y="264" text-anchor="middle" fill="#00ffff" font-size="8">▼</text>
  <!-- 標籤 -->
  <rect x="370" y="135" width="95" height="30" rx="4" fill="rgba(0,255,255,0.05)" stroke="#00ffff" stroke-width="0.8"/>
  <text x="418" y="154" text-anchor="middle" fill="#00ffff" font-size="8" font-family="monospace">AI分析工具</text>
  <rect x="35" y="135" width="95" height="30" rx="4" fill="rgba(255,0,170,0.05)" stroke="#ff00aa" stroke-width="0.8"/>
  <text x="82" y="154" text-anchor="middle" fill="#ff00aa" font-size="8" font-family="monospace">職場偵測器</text>
  <rect x="195" y="10" width="110" height="24" rx="4" fill="rgba(123,47,255,0.05)" stroke="#7b2fff" stroke-width="0.8"/>
  <text x="250" y="26" text-anchor="middle" fill="#7b2fff" font-size="8" font-family="monospace">智能對話系統</text>
  <rect x="192" y="276" width="116" height="24" rx="4" fill="rgba(0,255,255,0.05)" stroke="#00ffff" stroke-width="0.8"/>
  <text x="250" y="292" text-anchor="middle" fill="#00ffff" font-size="8" font-family="monospace">即時分潤追蹤</text>
</svg>