<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="bc-g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bc-g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bc-g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="bc-s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.1"/></filter>
    <filter id="bc-s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="900" height="360" fill="url(#bc-bg)"/>
  <!-- 背景裝飾 -->
  <circle cx="150" cy="80" r="80" fill="#dbeafe" opacity="0.3"/>
  <circle cx="750" cy="300" r="70" fill="#e0e7ff" opacity="0.3"/>
  <!-- 點陣 -->
  <defs><pattern id="bc-dot" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="#93c5fd" opacity="0.3"/></pattern></defs>
  <rect width="900" height="360" fill="url(#bc-dot)"/>

  <!-- 左欄：職場 -->
  <rect x="15" y="20" width="270" height="320" rx="16" fill="white" filter="url(#bc-s)"/>
  <rect x="15" y="20" width="270" height="5" rx="16" fill="url(#bc-g1)"/>
  <text x="150" y="50" text-anchor="middle" fill="#1e40af" font-size="12" font-family="sans-serif" font-weight="800">😤 職場煉獄</text>
  <!-- 場景 -->
  <rect x="30" y="65" width="240" height="110" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="105" text-anchor="middle" font-size="32">💼</text>
  <text x="150" y="135" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="sans-serif" font-weight="600">職場生存偵測中...</text>
  <text x="150" y="153" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="sans-serif">老闆套路 · 大餅識別 · 加班計算</text>
  <!-- 標籤組 -->
  <rect x="30" y="190" width="80" height="24" rx="12" fill="#dbeafe"/>
  <text x="70" y="206" text-anchor="middle" fill="#1d4ed8" font-size="8" font-family="sans-serif" font-weight="600">老闆大餅</text>
  <rect x="118" y="190" width="80" height="24" rx="12" fill="#ede9fe"/>
  <text x="158" y="206" text-anchor="middle" fill="#6d28d9" font-size="8" font-family="sans-serif" font-weight="600">職場鬼故事</text>
  <rect x="30" y="222" width="60" height="24" rx="12" fill="#d1fae5"/>
  <text x="60" y="238" text-anchor="middle" fill="#065f46" font-size="8" font-family="sans-serif" font-weight="600">加班文化</text>
  <rect x="98" y="222" width="60" height="24" rx="12" fill="#fef3c7"/>
  <text x="128" y="238" text-anchor="middle" fill="#92400e" font-size="8" font-family="sans-serif" font-weight="600">薪資真相</text>
  <rect x="166" y="222" width="70" height="24" rx="12" fill="#fee2e2"/>
  <text x="201" y="238" text-anchor="middle" fill="#991b1b" font-size="8" font-family="sans-serif" font-weight="600">離職策略</text>
  <text x="150" y="280" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">22 篇深度觀點文章</text>
  <rect x="40" y="298" width="210" height="32" rx="8" fill="url(#bc-g1)"/>
  <text x="145" y="319" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">進入職場區 →</text>

  <!-- 中欄：AI -->
  <rect x="315" y="20" width="270" height="320" rx="16" fill="white" filter="url(#bc-s)"/>
  <rect x="315" y="20" width="270" height="5" rx="16" fill="url(#bc-g2)"/>
  <text x="450" y="50" text-anchor="middle" fill="#0e7490" font-size="12" font-family="sans-serif" font-weight="800">🤖 AI 照妖鏡</text>
  <!-- AI 視覺 -->
  <circle cx="450" cy="130" r="55" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <circle cx="450" cy="130" r="40" fill="white" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="450" y="120" text-anchor="middle" font-size="24">🤖</text>
  <text x="450" y="148" text-anchor="middle" fill="#3b82f6" font-size="8" font-family="sans-serif" font-weight="600">SCANNING...</text>
  <!-- 掃描線 -->
  <line x1="390" y1="120" x2="510" y2="120" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="390" y1="130" x2="510" y2="130" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- 統計 -->
  <rect x="330" y="200" width="120" height="50" rx="10" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="390" y="222" text-anchor="middle" fill="#065f46" font-size="14" font-weight="800" font-family="sans-serif">19</text>
  <text x="390" y="240" text-anchor="middle" fill="#64748b" font-size="8" font-family="sans-serif">篇AI觀點</text>
  <rect x="470" y="200" width="105" height="50" rx="10" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="522" y="222" text-anchor="middle" fill="#6d28d9" font-size="14" font-weight="800" font-family="sans-serif">99%</text>
  <text x="522" y="240" text-anchor="middle" fill="#64748b" font-size="8" font-family="sans-serif">謊言識破</text>
  <text x="450" y="278" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">AI裁員 · 割韭菜 · 打字機</text>
  <rect x="340" y="298" width="220" height="32" rx="8" fill="url(#bc-g2)"/>
  <text x="450" y="319" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">進入 AI 區 →</text>

  <!-- 右欄：商城 -->
  <rect x="615" y="20" width="270" height="320" rx="16" fill="white" filter="url(#bc-s)"/>
  <rect x="615" y="20" width="270" height="5" rx="16" fill="url(#bc-g3)"/>
  <text x="750" y="50" text-anchor="middle" fill="#065f46" font-size="12" font-family="sans-serif" font-weight="800">🛒 AI 玩具商城</text>
  <!-- 商品展示 -->
  <text x="750" y="110" text-anchor="middle" font-size="36">🤖</text>
  <rect x="630" y="125" width="240" height="75" rx="10" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="660" y="160" font-size="20">🧸</text>
  <text x="700" y="160" font-size="20">♟️</text>
  <text x="740" y="160" font-size="20">📚</text>
  <text x="780" y="160" font-size="20">🐕</text>
  <text x="750" y="190" text-anchor="middle" fill="#065f46" font-size="8" font-family="sans-serif">NT$153 ~ NT$3,499</text>
  <!-- 分潤徽章 -->
  <rect x="680" y="215" width="140" height="28" rx="14" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="750" y="233" text-anchor="middle" fill="#92400e" font-size="9" font-family="sans-serif" font-weight="700">最高分潤 19% 🎯</text>
  <!-- 分類 -->
  <rect x="630" y="252" width="55" height="22" rx="11" fill="#dbeafe"/>
  <text x="658" y="267" text-anchor="middle" fill="#1d4ed8" font-size="7" font-family="sans-serif">毛絨陪伴</text>
  <rect x="693" y="252" width="55" height="22" rx="11" fill="#ede9fe"/>
  <text x="721" y="267" text-anchor="middle" fill="#6d28d9" font-size="7" font-family="sans-serif">AI機器人</text>
  <rect x="756" y="252" width="55" height="22" rx="11" fill="#d1fae5"/>
  <text x="784" y="267" text-anchor="middle" fill="#065f46" font-size="7" font-family="sans-serif">早教學習</text>
  <text x="750" y="292" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">60 件精選蝦皮聯盟商品</text>
  <rect x="640" y="298" width="220" height="32" rx="8" fill="url(#bc-g3)"/>
  <text x="750" y="319" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">進入商城 →</text>
</svg>