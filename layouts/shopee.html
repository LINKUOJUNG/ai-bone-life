{{ define "main" }}
<style>
.shopee-hero {
  background: linear-gradient(135deg,#0a0a0a 0%,#0d1a0d 60%,#0a0a0a 100%);
  border-bottom: 1px solid #1f2d1f;
  padding: 48px 24px 32px;
  text-align: center; position: relative; overflow: hidden;
}
.shopee-hero::before {
  content:\'\'; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(80,250,123,.08) 0%,transparent 70%);
}
.shopee-hero h1{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;color:#f8f8f2;margin-bottom:8px;}
.shopee-hero h1 span{color:#50fa7b;}
.shopee-hero p{color:#6272a4;font-size:.9rem;}
.shopee-stats{display:flex;gap:32px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.shopee-stat-num{font-size:1.6rem;font-weight:700;color:#50fa7b;}
.shopee-stat-label{font-size:.72rem;color:#6272a4;text-transform:uppercase;letter-spacing:.08em;}
.shopee-controls{
  background:#111;border-bottom:1px solid #1f2d1f;
  padding:16px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  position:sticky;top:60px;z-index:50;
}
.shopee-search{
  flex:1;min-width:200px;background:#161616;border:1px solid #1f2d1f;
  color:#f8f8f2;padding:9px 16px;border-radius:8px;font-size:.88rem;outline:none;
  transition:border-color .2s;
}
.shopee-search:focus{border-color:#50fa7b;box-shadow:0 0 0 2px rgba(80,250,123,.1);}
.shopee-search::placeholder{color:#6272a4;}
.filter-btn{
  padding:8px 16px;border-radius:8px;border:1px solid #1f2d1f;
  background:#161616;color:#6272a4;cursor:pointer;font-size:.8rem;font-weight:500;
  transition:all .2s;white-space:nowrap;
}
.filter-btn.active,.filter-btn:hover{background:#50fa7b;color:#0a0a0a;border-color:#50fa7b;font-weight:700;}
.sort-select{background:#161616;border:1px solid #1f2d1f;color:#6272a4;padding:8px 12px;border-radius:8px;font-size:.8rem;}
.shopee-count{padding:12px 24px;color:#6272a4;font-size:.8rem;}
.shopee-count strong{color:#50fa7b;}
.shopee-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:16px;padding:16px 24px 48px;max-width:1400px;margin:0 auto;
}

/* ── 商品卡片 ── */
.s-card{
  background:#161616;border:1px solid #1f2d1f;border-radius:14px;
  overflow:hidden;transition:transform .22s,border-color .22s,box-shadow .22s;
  display:flex;flex-direction:column;cursor:pointer;text-decoration:none;
}
.s-card:hover{transform:translateY(-5px);border-color:var(--ac);box-shadow:0 12px 36px rgba(0,0,0,.4);}

/* ── 圖片區：支援真實圖片 + Emoji fallback ── */
.s-card-thumb{
  position:relative;height:160px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
/* 真實圖片 */
.s-card-thumb img.product-img{
  width:100%;height:100%;object-fit:cover;
  position:absolute;inset:0;
  transition:transform .3s,opacity .3s;
  opacity:0; /* 預設隱藏，載入成功才顯示 */
}
.s-card-thumb img.product-img.loaded{opacity:1;}
.s-card-thumb img.product-img.error{display:none;}

/* Emoji fallback 背景 */
.s-card-thumb .emoji-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;
  transition:opacity .3s;
}
.s-card-thumb .emoji-bg .emoji-icon{font-size:3.5rem;line-height:1;}
.s-card-thumb .emoji-bg .emoji-cat{
  font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  opacity:.7;
}
/* 當圖片載入成功時隱藏 emoji */
.s-card-thumb.img-loaded .emoji-bg{opacity:0;pointer-events:none;}

/* Hover 放大圖片 */
.s-card:hover .s-card-thumb img.product-img.loaded{transform:scale(1.05);}

/* 角落標籤 */
.s-card-badge{
  position:absolute;top:10px;left:10px;z-index:2;
  font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.08em;
  backdrop-filter:blur(4px);
}
.badge-plush{background:rgba(255,121,198,.2);color:#ff79c6;border:1px solid rgba(255,121,198,.4);}
.badge-robot{background:rgba(139,233,253,.2);color:#8be9fd;border:1px solid rgba(139,233,253,.4);}
.badge-chess{background:rgba(189,147,249,.2);color:#bd93f9;border:1px solid rgba(189,147,249,.4);}
.badge-edu  {background:rgba(255,184,108,.2);color:#ffb86c;border:1px solid rgba(255,184,108,.4);}
.s-card-hot{
  position:absolute;top:10px;right:10px;z-index:2;
  background:#ff5555;color:#fff;font-size:.6rem;font-weight:700;
  padding:2px 7px;border-radius:4px;
}

/* 蝦皮購物 hover overlay */
.s-card-thumb .shopee-overlay{
  position:absolute;inset:0;z-index:3;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.s-card:hover .s-card-thumb .shopee-overlay{opacity:1;}
.shopee-overlay span{
  background:#ee4d2d;color:#fff;font-size:.75rem;font-weight:700;
  padding:8px 16px;border-radius:6px;letter-spacing:.04em;
}

/* ── 卡片資訊區 ── */
.s-card-body{padding:14px;flex:1;display:flex;flex-direction:column;}
.s-card-name{
  font-size:.82rem;font-weight:600;color:#f8f8f2;line-height:1.5;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.s-card-meta{display:flex;justify-content:space-between;margin-bottom:10px;}
.s-card-store,.s-card-sales{font-size:.7rem;color:#6272a4;}
.s-card-bottom{margin-top:auto;}
.s-card-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.s-card-price{font-size:1.1rem;font-weight:800;color:#50fa7b;}
.s-card-commission{font-size:.68rem;color:#6272a4;background:rgba(80,250,123,.06);padding:2px 6px;border-radius:4px;}
.s-card-rate{font-size:.68rem;color:#ffb86c;background:rgba(255,184,108,.08);padding:2px 6px;border-radius:4px;}
.s-card-btn{
  display:block;text-align:center;background:#ee4d2d;color:#fff !important;
  padding:9px 0;border-radius:8px;font-weight:700;font-size:.8rem;
  text-decoration:none !important;transition:background .2s,box-shadow .2s;
}
.s-card-btn:hover{background:#ff6b4a !important;color:#fff !important;box-shadow:0 0 16px rgba(238,77,45,.3);}
.no-results{text-align:center;padding:80px 24px;color:#6272a4;display:none;}

@media(max-width:600px){
  .shopee-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
  .s-card-thumb{height:130px;}
  .shopee-controls{top:0;}
}
</style>

<div class="shopee-hero">
  <h1>💀 骨頭人 <span>AI 玩具商城</span></h1>
  <p>精選蝦皮聯盟商品，骨頭人幫你篩過了，每一件都是真材實料</p>
  <div class="shopee-stats">
    <div class="shopee-stat"><div class="shopee-stat-num">60</div><div class="shopee-stat-label">精選商品</div></div>
    <div class="shopee-stat"><div class="shopee-stat-num">4</div><div class="shopee-stat-label">商品分類</div></div>
    <div class="shopee-stat"><div class="shopee-stat-num">最高 19%</div><div class="shopee-stat-label">聯盟分潤</div></div>

</div>

<div class="shopee-controls">
  <input type="text" class="shopee-search" id="searchInput" placeholder="🔍 搜尋商品名稱..." />
  <button class="filter-btn active" data-cat="全部">全部</button>

  <button class="filter-btn" data-cat="AI機器人">🤖 AI機器人</button>

  <button class="filter-btn" data-cat="AI棋盤桌遊">♟️ 棋盤桌遊</button>
  <select class="sort-select" id="sortSelect">
    <option value="default">預設排序</option>
    <option value="price-asc">價格低到高</option>
    <option value="price-desc">價格高到低</option>
    <option value="commission-desc">分潤高到低</option>
    <option value="sales-desc">銷售量高到低</option>
  </select>
</div>

<div class="shopee-count" id="resultCount">顯示 <strong>60</strong> 件商品</div>
<div class="shopee-grid" id="productGrid"></div>
<div class="no-results" id="noResults">
  <div style="font-size:3rem">💀</div>
  <div>這裡什麼都沒有，骨頭人也找不到你要的商品。</div>
</div>

const catBadge = {
  '毛絨陪伴玩具':{cls:'badge-plush',label:'毛絨陪伴'},
  'AI機器人'    :{cls:'badge-robot',label:'AI機器人'},
  'AI棋盤桌遊'  :{cls:'badge-chess',label:'棋盤桌遊'},
  '早教學習機'  :{cls:'badge-edu',  label:'早教學習'}
};

let currentCat='全部', currentSearch='', currentSort='default';

function bindImgEvents() {
  document.querySelectorAll('.product-img').forEach(img => {
    if (img.complete) {
      handleImgLoad(img);
    } else {
      img.addEventListener('load',  () => handleImgLoad(img));
      img.addEventListener('error', () => handleImgError(img));
    }
  });
}

function handleImgLoad(img) {
  img.classList.add('loaded');
  img.closest('.s-card-thumb').classList.add('img-loaded');
}

function handleImgError(img) {
  img.classList.add('error');
  // emoji-bg 自動顯示（預設可見）
}

function renderProducts() {
  let list = [...PRODUCTS];
  if (currentCat !== '全部') list = list.filter(p => p.cat === currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.store.toLowerCase().includes(q));
  }
  if (currentSort === 'price-asc')  list.sort((a,b) => a.price - b.price);
  if (currentSort === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (currentSort === 'sales-desc') list.sort((a,b) => b.sales - a.sales);
  if (currentSort === 'commission-desc') {
    list.sort((a,b) => parseFloat(b.commission.replace('$','')) - parseFloat(a.commission.replace('$','')));
  }

  const grid = document.getElementById('productGrid');
  const noRes = document.getElementById('noResults');
  document.getElementById('resultCount').innerHTML = `顯示 <strong>${list.length}</strong> 件商品`;

  if (!list.length) { grid.innerHTML = ''; noRes.style.display='block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = list.map(p => {
    const b = catBadge[p.cat] || {cls:'badge-robot', label:p.cat};
    const hot = p.sales > 5 ? '<span class=\"s-card-hot\">🔥 熱銷</span>' : '';
    const hasImg = p.img && p.img.length > 0;
    const imgTag = hasImg
      ? `<img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">`
      : '';
    const gradient = p.gradient || 'linear-gradient(135deg,#0f1f0f,#111)';
    const accent = p.accent || '#50fa7b';

    return `
<a class="s-card" href="${p.url}" target="_blank" rel="noopener" style="--ac:${accent}">
  <div class="s-card-thumb" style="background:${gradient}">
    ${imgTag}
    <div class="emoji-bg">
      <span class="emoji-icon">${p.emoji}</span>
      <span class="emoji-cat" style="color:${accent}">${p.cat}</span>
    </div>
    <span class="s-card-badge ${b.cls}">${b.label}</span>
    ${hot}
    <div class="shopee-overlay"><span>🛒 前往蝦皮</span></div>
  </div>
  <div class="s-card-body">
    <div class="s-card-name">${p.name}</div>
    <div class="s-card-meta">
      <span class="s-card-store">🏪 ${p.store}</span>
      <span class="s-card-sales">售出 ${p.sales}</span>
    </div>
    <div class="s-card-bottom">
      <div class="s-card-price-row">
        <span class="s-card-price">NT$ ${p.price.toLocaleString()}</span>
        <span class="s-card-commission">分潤 ${p.commission}</span>
        <span class="s-card-rate">${p.rate}</span>
      </div>
      <span class="s-card-btn">🛒 前往蝦皮購買</span>
    </div>
  </div>
</a>`;
  }).join('');

  bindImgEvents();
}

document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value; renderProducts(); });
document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; renderProducts(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderProducts();
  });
});

renderProducts();
</script>
