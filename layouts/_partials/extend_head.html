{{- /* 頁面載入進度條 + 文章閱讀進度條 + 打字機效果 */ -}}

<!-- 頁面載入進度條 -->
<div id="page-load-bar"></div>

<!-- 文章閱讀進度條 -->
{{ if .IsPage }}
<div id="reading-progress-bar"></div>
{{ end }}

<script>
// ── 文章閱讀進度條 ──
document.addEventListener('DOMContentLoaded', function () {
  var bar = document.getElementById('reading-progress-bar');
  if (!bar) return;
  window.addEventListener('scroll', function () {
    var st = window.scrollY || document.documentElement.scrollTop;
    var dh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    bar.style.width = (dh > 0 ? (st / dh) * 100 : 0) + '%';
  });
});

// ── 打字機效果（首頁英雄標語）──
document.addEventListener('DOMContentLoaded', function () {
  var title = document.querySelector('.home-info h1, #home-info h1');
  if (!title) return;
  var text = title.textContent;
  title.textContent = '';
  title.style.borderRight = '3px solid #ff6b35';
  title.style.display = 'inline-block';
  var i = 0;
  function type() {
    if (i < text.length) {
      title.textContent += text.charAt(i++);
      setTimeout(type, 70);
    } else {
      title.style.animation = 'blink-caret 0.8s step-end infinite';
    }
  }
  setTimeout(type, 300);
});
</script>
